<!doctype html>
<html lang="ja" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>じゃんけん5回勝負</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
  html, body { height:100%; margin:0; padding:0; overflow:hidden; touch-action:none;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; position:fixed; inset:0; }
  .wrap { height:100%; width:100%; position:relative;
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    display:flex; flex-direction:column; align-items:center; overflow:hidden; }
  .jp { font-family:'Noto Sans JP', sans-serif; }
  .pixel { font-family:'Press Start 2P', cursive; }

  /* キャラクター（1.5倍・向かい合う） */
  .char-img { height:clamp(245px, 52vh, 500px); width:auto; filter:drop-shadow(0 6px 8px rgba(0,0,0,0.4)); }
  #cpuImg { height:clamp(260px, 55vh, 530px); }

  /* こぶし（手だけが動く） */
  .fist { position:absolute; left:50%; bottom:30%; transform:translate(-50%,0);
    font-size:clamp(2.4rem,11vw,4.4rem); opacity:0; pointer-events:none; z-index:6;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,0.45)); }
  .fist.show { opacity:1; }
  @keyframes fistpump { 0%,100%{transform:translate(-50%,0)} 30%{transform:translate(-50%,-22px)} 60%{transform:translate(-50%,0)} 80%{transform:translate(-50%,-11px)} }
  .fist.on { animation:fistpump 0.4s ease-in-out infinite; }
  @keyframes fistpop { 0%{transform:translate(-50%,0) scale(0.5)} 60%{transform:translate(-50%,0) scale(1.25)} 100%{transform:translate(-50%,0) scale(1)} }
  .fist.reveal { animation:fistpop 0.35s ease-out; }

  /* ペンギン・トークン */
  .pool { display:flex; flex-direction:row; align-items:center; justify-content:center; gap:5px; flex-wrap:wrap; width:100%; max-width:680px; padding:4px 8px 0; min-height:46px; }
  .arena { position:relative; flex:1; width:100%; max-width:760px; display:flex; align-items:center; justify-content:center; gap:2px; padding:0 44px; }
  .stack { position:absolute; bottom:6%; display:flex; flex-direction:column-reverse; align-items:center; gap:3px; z-index:7; }
  #leftStack { left:1px; } #rightStack { right:1px; }
  .pgn { height:clamp(32px,8vw,50px); width:auto; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.4)); }
  @keyframes tokenpop { 0%{transform:scale(0.2);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
  .pgn.pop { animation:tokenpop 0.4s ease-out; }

  .bubble { background:#fff; color:#222; border-radius:18px; padding:6px 8px; min-width:60px;
    text-align:center; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.3); font-size:clamp(2rem,10vw,3.6rem); }
  .bubble::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
    border-left:10px solid transparent; border-right:10px solid transparent; border-top:12px solid #fff; }

  .choice-btn { pointer-events:auto; border:none; cursor:pointer; border-radius:22px; padding:10px 6px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    background:rgba(255,255,255,0.12); color:#fff; box-shadow:0 6px 16px rgba(0,0,0,0.35);
    transition:transform 0.08s, background 0.12s; touch-action:none; }
  .choice-btn:active { transform:scale(0.92); background:rgba(255,255,255,0.28); }
  .choice-btn:disabled { opacity:0.35; }

  @keyframes jump { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-44px)} 50%{transform:translateY(0)} 70%{transform:translateY(-22px)} 85%{transform:translateY(0)} }
  .jumping { animation:jump 0.8s ease-in-out 4; }
  @keyframes arrowbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(12px)} }
  .arrow { font-size:44px; animation:arrowbob 0.6s infinite; color:#ffd700; text-shadow:0 0 12px #ffae00; }

  @keyframes confetti-fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
  .confetti { position:absolute; top:0; width:14px; height:20px; border-radius:3px; animation:confetti-fall linear forwards; z-index:80; }
  @keyframes rain-fall { 0%{transform:translateY(-10px);opacity:1} 100%{transform:translateY(110vh);opacity:0.7} }
  .rain { position:absolute; top:0; font-size:28px; animation:rain-fall linear forwards; z-index:80; }
  @keyframes fw { 0%{transform:translate(0,0) scale(0);opacity:1} 70%{opacity:1} 100%{opacity:0} }
  .fw-p { position:absolute; width:10px; height:10px; border-radius:50%; animation:fw 1.4s ease-out forwards; }
  @keyframes lightning { 0%,100%{opacity:0} 8%,18%,30%{opacity:1} 14%,24%{opacity:0} }
  #lightning { position:absolute; inset:0; background:rgba(255,255,255,0.95); z-index:75; opacity:0; pointer-events:none; }
  #lightning.on { animation:lightning 0.9s ease-in-out; }

  #flash { position:absolute; inset:0; z-index:70; pointer-events:none; opacity:0; transition:opacity 0.15s; }
  #finale { position:absolute; inset:0; z-index:95; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.55); text-align:center; }
  #finale.show { display:flex; }
  @keyframes bigzoom { 0%{transform:scale(0.2) rotate(-12deg);opacity:0} 50%{transform:scale(1.25) rotate(4deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
  .bigzoom { animation:bigzoom 0.6s cubic-bezier(.2,1.3,.4,1) forwards; }
  @keyframes pop { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
  .pop { animation:pop 0.35s ease-out; }
</style>
</head>

    <div class="w-full flex justify-between items-center mb-1" style="max-width:680px;">

  const TOTAL=5;
  let round=1, wins=0, loses=0, busy=false, canPick=false;
  const youImg=document.getElementById('youImg'), cpuImg=document.getElementById('cpuImg');
  const youBubble=document.getElementById('youBubble'), cpuBubble=document.getElementById('cpuBubble');
  const msg=document.getElementById('message'), arrow=document.getElementById('arrow');
  const flash=document.getElementById('flash'), lightning=document.getElementById('lightning');
  const finale=document.getElementById('finale'), finaleText=document.getElementById('finaleText');
  const pool=document.getElementById('pool'), leftStack=document.getElementById('leftStack'), rightStack=document.getElementById('rightStack');
  const buttons=[...document.querySelectorAll('.choice-btn')];
  function setButtons(on){ buttons.forEach(b=>b.disabled=!on); }

  function addFist(imgEl){ const col=imgEl.parentElement; const f=document.createElement('span'); f.className='fist'; f.textContent='✊'; col.appendChild(f); return f; }
  const youFist=addFist(youImg), cpuFist=addFist(cpuImg);

  function buildTokens(){ pool.innerHTML=''; leftStack.innerHTML=''; rightStack.innerHTML='';
    for(let i=0;i<TOTAL;i++){ const im=document.createElement('img'); im.className='pgn'; im.src=PENGUIN_SRC; im.alt='ペンギン'; pool.appendChild(im); } }

  function moveToken(side){ const t=pool.lastElementChild; if(!t) return;
    const s=t.getBoundingClientRect(); const target=(side==='left'?leftStack:rightStack); pool.removeChild(t);
    const fly=document.createElement('img'); fly.src=PENGUIN_SRC; fly.alt='';
    fly.style.cssText='position:fixed;left:'+s.left+'px;top:'+s.top+'px;height:'+s.height+'px;width:auto;z-index:90;filter:drop-shadow(0 3px 4px rgba(0,0,0,.45));transition:left .7s cubic-bezier(.34,1.1,.5,1),top .7s cubic-bezier(.34,1.1,.5,1);';
    document.body.appendChild(fly);
    const ph=document.createElement('img'); ph.src=PENGUIN_SRC; ph.className='pgn'; ph.style.visibility='hidden'; target.appendChild(ph);
    const d=ph.getBoundingClientRect(); target.removeChild(ph);
    requestAnimationFrame(()=>{ fly.style.left=d.left+'px'; fly.style.top=d.top+'px'; });
    setTimeout(()=>{ fly.remove(); const real=document.createElement('img'); real.src=PENGUIN_SRC; real.className='pgn pop'; real.alt='ペンギン'; target.appendChild(real); }, 720); }

  function doFlash(color){ flash.style.background=color; flash.style.opacity='1'; setTimeout(()=>flash.style.opacity='0',180); }

  function startRound(){
    youBubble.textContent='？'; cpuBubble.textContent='？';
    youImg.classList.remove('jumping'); cpuImg.classList.remove('jumping');
    youFist.className='fist'; cpuFist.className='fist'; youFist.textContent='✊'; cpuFist.textContent='✊';
    arrow.style.visibility='hidden'; canPick=false; setButtons(false);
    msg.textContent='第'+round+'回戦！';
    setTimeout(()=>{ youFist.className='fist show on'; cpuFist.className='fist show on'; msg.textContent='じゃんけん…'; speak('じゃんけん'); ponSound(); }, 700);
    setTimeout(()=>{ msg.textContent='ぽん！'; speak('ぽん'); }, 2000);
    setTimeout(()=>{ youFist.className='fist show'; cpuFist.className='fist show';
      msg.textContent='どれを出す？👇'; arrow.style.visibility='visible'; canPick=true; setButtons(true); }, 3000);
  }

  function pick(playerHand){
    if(!canPick||busy) return;
    busy=true; canPick=false; setButtons(false); arrow.style.visibility='hidden';
    const cpuHand=Math.floor(Math.random()*3);
    youFist.textContent=HANDS[playerHand].emoji; cpuFist.textContent=HANDS[cpuHand].emoji;
    youFist.className='fist show reveal'; cpuFist.className='fist show reveal';
    youBubble.textContent=HANDS[playerHand].emoji; cpuBubble.textContent=HANDS[cpuHand].emoji;
    [youBubble,cpuBubble].forEach(b=>{ b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop'); });
    let result;
    if(playerHand===cpuHand) result='draw';
    else if(HANDS[playerHand].beats===cpuHand) result='win';
    else result='lose';
    if(result==='draw'){ msg.textContent='あいこ！もう一回！';
      doFlash('radial-gradient(circle, rgba(255,255,255,0.5), rgba(255,255,255,0))'); drawSound(); speak('あいこでしょ');
      setTimeout(()=>{ busy=false; startRound(); }, 1500); return; }
    if(result==='win'){ wins++; moveToken('left');
      msg.textContent='この回はあなたの勝ち！'; doFlash('radial-gradient(circle, rgba(255,215,0,0.7), rgba(255,140,0,0.1))'); winSound(); speak('かち');
    } else { loses++; moveToken('right');
      msg.textContent='この回は男の子の勝ち…'; doFlash('radial-gradient(circle, rgba(60,80,160,0.8), rgba(10,10,30,0.3))'); loseSound(); speak('まけ'); }
    setTimeout(()=>{ busy=false; if(round>=TOTAL){ doFinale(); } else { round++; startRound(); } }, 1700);
  }

  buttons.forEach(b=>{ const h=(e)=>{ e.preventDefault(); actx(); if(bgmOn&&!bgmTimer) startBGM(); pick(parseInt(b.dataset.hand,10)); };
    b.addEventListener('click',h); b.addEventListener('touchstart',h,{passive:false}); });

  function doFinale(){
    const youWin = wins>loses;
    finale.classList.add('show');
    if(youWin){
      finaleText.innerHTML='<div class="bigzoom" style="font-size:60px;color:#ffd700;text-shadow:0 0 24px #ffae00;">優勝！🏆</div>'
        +'<div class="text-white text-xl mt-2">あなた '+wins+' - '+loses+' 男の子</div>';
      msg.textContent='やったね！かったよ！'; youImg.classList.add('jumping'); speak('やったね。かったよ',1.3,0.68); fireworksShow();
    } else {
      finaleText.innerHTML='<div class="bigzoom" style="font-size:56px;color:#7fb3ff;text-shadow:0 0 20px #2255aa;">まけちゃった…💧</div>'
        +'<div class="text-white text-xl mt-2">あなた '+wins+' - '+loses+' 男の子</div>';
      msg.textContent='残念、まけちゃった'; speak('残念、まけちゃった',1.2,0.68); rainShow(); lightningShow();
    }
  }
  document.getElementById('restartBtn').addEventListener('click', ()=>{ finale.classList.remove('show'); round=1; wins=0; loses=0; buildTokens(); startRound(); });

  function fireworksShow(){ const colors=['#ff4757','#ffd700','#00d2d3','#ff6b81','#7bed9f','#ff9ff3','#54a0ff']; let count=0;
    const iv=setInterval(()=>{ fireworkSound(); const cx=10+Math.random()*80, cy=10+Math.random()*45;
      for(let i=0;i<16;i++){ const p=document.createElement('div'); p.className='fw-p'; const ang=(i/16)*Math.PI*2, dist=70+Math.random()*60;
        p.style.left=cx+'vw'; p.style.top=cy+'vh'; p.style.background=colors[Math.floor(Math.random()*colors.length)];
        p.style.transform='translate('+Math.cos(ang)*dist+'px,'+Math.sin(ang)*dist+'px)'; document.body.appendChild(p); setTimeout(()=>p.remove(),1500); }
      confettiBurst(30); count++; if(count>=5) clearInterval(iv); }, 600); }
  function confettiBurst(n){ const colors=['#ff4757','#ffd700','#00d2d3','#ff6b81','#7bed9f','#ff9ff3','#54a0ff'];
    for(let i=0;i<n;i++){ const p=document.createElement('div'); p.className='confetti'; p.style.left=Math.random()*100+'vw';
      p.style.background=colors[Math.floor(Math.random()*colors.length)]; p.style.animationDuration=(1.4+Math.random()*1.4)+'s'; p.style.animationDelay=(Math.random()*0.3)+'s';
      document.body.appendChild(p); setTimeout(()=>p.remove(),3000); } }
  function rainShow(){ let count=0; const iv=setInterval(()=>{ for(let i=0;i<14;i++){ const p=document.createElement('div'); p.className='rain'; p.textContent='💧';
      p.style.left=Math.random()*100+'vw'; p.style.animationDuration=(0.9+Math.random()*0.9)+'s'; p.style.animationDelay=(Math.random()*0.2)+'s';
      document.body.appendChild(p); setTimeout(()=>p.remove(),2200); } count++; if(count>=6) clearInterval(iv); }, 500); }
  function lightningShow(){ let count=0; const f=()=>{ lightning.classList.remove('on'); void lightning.offsetWidth; lightning.classList.add('on'); thunderSound(); };
    f(); const iv=setInterval(()=>{ f(); count++; if(count>=3) clearInterval(iv); }, 1100); }

  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('contextmenu', e=>e.preventDefault());
  let lastTouch=0; document.addEventListener('touchend', e=>{ const n=Date.now(); if(n-lastTouch<=300) e.preventDefault(); lastTouch=n; }, {passive:false});

  buildTokens();
  setTimeout(startRound, 600);
</script>
</body>
</html>
