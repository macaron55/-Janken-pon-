<!doctype html>
<html lang="ja" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>じゃんけん5回勝負</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0; overflow: hidden;
      touch-action: none; -webkit-touch-callout: none;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
      position: fixed; inset: 0;
    }
    .wrap {
      height: 100%; width: 100%; position: relative;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; overflow: hidden;
    }
    .jp { font-family: 'Noto Sans JP', sans-serif; }
    .pixel { font-family: 'Press Start 2P', cursive; }
    @keyframes shake { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-16px)} 50%{transform:translateY(0)} 75%{transform:translateY(-9px)} }
    .shaking { animation: shake 0.4s ease-in-out infinite; }
    @keyframes pop { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.35s ease-out; }
    @keyframes jump { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-44px)} 50%{transform:translateY(0)} 70%{transform:translateY(-22px)} 85%{transform:translateY(0)} }
    .jumping { animation: jump 0.8s ease-in-out 4; }
    @keyframes arrowbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(12px)} }
    .arrow { font-size:44px; animation: arrowbob 0.6s infinite; color:#ffd700; text-shadow:0 0 12px #ffae00; }
    @keyframes confetti-fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
    .confetti { position:absolute; top:0; width:14px; height:20px; border-radius:3px; animation: confetti-fall linear forwards; z-index:80; }
    @keyframes rain-fall { 0%{transform:translateY(-10px);opacity:1} 100%{transform:translateY(110vh);opacity:0.7} }
    .rain { position:absolute; top:0; font-size:28px; animation: rain-fall linear forwards; z-index:80; }
    @keyframes fw { 0%{transform:translate(0,0) scale(0);opacity:1} 70%{opacity:1} 100%{opacity:0} }
    .fw-p { position:absolute; width:10px; height:10px; border-radius:50%; animation: fw 1.4s ease-out forwards; }
    @keyframes lightning { 0%,100%{opacity:0} 8%,18%,30%{opacity:1} 14%,24%{opacity:0} }
    #lightning { position:absolute; inset:0; background:rgba(255,255,255,0.95); z-index:75; opacity:0; pointer-events:none; }
    #lightning.on { animation: lightning 0.9s ease-in-out; }
    .choice-btn {
      pointer-events:auto; border:none; cursor:pointer; border-radius: 22px; padding: 10px 6px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
      background: rgba(255,255,255,0.12); color:#fff; box-shadow: 0 6px 16px rgba(0,0,0,0.35);
      transition: transform 0.08s, background 0.12s; touch-action: none;
    }
    .choice-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.28); }
    .choice-btn:disabled { opacity:0.35; }
    .bubble {
      background:#fff; color:#222; border-radius:18px; padding:6px 4px; min-width:64px;
      text-align:center; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }
    .bubble::after {
      content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
      border-left:10px solid transparent; border-right:10px solid transparent; border-top:12px solid #fff;
    }
    .char-img { height: 42vh; max-height: 382px; width:auto; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4)); }
    #scoreTable { border-collapse:collapse; }
    #scoreTable td, #scoreTable th { border:1px solid rgba(255,255,255,0.3); padding:3px 15px; font-size:1.3rem; }
    .curRow { background: rgba(255,215,0,0.18); }
    #flash { position:absolute; inset:0; z-index:70; pointer-events:none; opacity:0; transition:opacity 0.15s; }
    #finale {
      position:absolute; inset:0; z-index:95; display:none; flex-direction:column;
      align-items:center; justify-content:center; background:rgba(0,0,0,0.55); text-align:center;
    }
    #finale.show { display:flex; }
    @keyframes bigzoom { 0%{transform:scale(0.2) rotate(-12deg);opacity:0} 50%{transform:scale(1.25) rotate(4deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
    .bigzoom { animation: bigzoom 0.6s cubic-bezier(.2,1.3,.4,1) forwards; }
  </style>
 </head>
 <body class="h-full w-full">
  <div class="wrap" id="wrap">
    <div class="w-full px-3 pt-3 flex flex-col items-center">
      <div class="w-full flex justify-between items-center mb-1">
        <span class="text-yellow-300 jp" style="font-weight:900;">じゃんけん5回勝負</span>
        <button id="bgmBtn" class="bg-black/50 rounded-lg px-2 py-1 text-lg">🔇</button>
      </div>
      <table id="scoreTable" class="jp text-center text-white text-sm" style="font-weight:900;">
        <thead><tr class="text-xs">
          <th>回</th><th class="text-pink-300">男の子</th><th class="text-sky-300">あなた🐧</th><th>勝敗</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="flex-1 w-full flex items-center justify-around px-2 relative" style="max-width:680px;">
      <div class="flex flex-col items-center gap-1">
        <div id="youBubble" class="bubble text-4xl">？</div>
        <img id="youImg" class="char-img" src="penguin.png" alt="ペンギン（あなた）">
        <div class="text-sky-300 jp text-sm" style="font-weight:900;">あなた</div>
      </div>
      <div class="text-white pixel text-xl" style="text-shadow:0 0 10px #ffd700;">VS</div>
      <div class="flex flex-col items-center gap-1">
        <div id="cpuBubble" class="bubble text-4xl">？</div>
        <img id="cpuImg" class="char-img" src="boy.png" alt="男の子" style="transform:scaleX(-1);">
        <div class="text-pink-300 jp text-sm" style="font-weight:900;">男の子</div>
      </div>
    </div>

    <div id="message" class="jp text-center text-2xl text-white h-9 px-4" style="font-weight:900; text-shadow:0 2px 6px rgba(0,0,0,0.6);">スタート！</div>
    <div id="arrow" class="arrow" style="visibility:hidden;">⬇</div>

    <div id="choices" class="w-full px-4 pb-5 pt-1 grid grid-cols-3 gap-3" style="max-width:560px;">
      <button class="choice-btn jp" data-hand="0"><span class="text-5xl">✊</span><span class="text-xs font-bold">グー</span></button>
      <button class="choice-btn jp" data-hand="1"><span class="text-5xl">✌️</span><span class="text-xs font-bold">チョキ</span></button>
      <button class="choice-btn jp" data-hand="2"><span class="text-5xl">🖐</span><span class="text-xs font-bold">パー</span></button>
    </div>

    <div id="flash"></div>
    <div id="lightning"></div>
    <div id="finale">
      <div id="finaleText" class="jp" style="font-weight:900;"></div>
      <button id="restartBtn" class="mt-6 px-6 py-3 bg-pink-500 text-white rounded-xl jp text-lg" style="font-weight:900;">もう一回あそぶ</button>
    </div>
  </div>

  <script>
    // ===== サウンド =====
    let audioCtx;
    function actx(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
    function beep(freq, dur, type, vol, when){
      try{
        const c=actx(); const t=c.currentTime+(when||0);
        const o=c.createOscillator(); const g=c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type=type||'sine'; o.frequency.value=freq;
        g.gain.setValueAtTime(vol||0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t+(dur||0.15));
        o.start(t); o.stop(t+(dur||0.15));
      }catch(e){}
    }
    function ponSound(){ beep(523,0.1,'square',0.06); beep(659,0.1,'square',0.06,0.12); beep(880,0.2,'square',0.07,0.24); }
    function winSound(){ [659,784,988,1318,1568].forEach((f,i)=>beep(f,0.22,'triangle',0.1,i*0.1)); }
    function loseSound(){ [392,330,262,196].forEach((f,i)=>beep(f,0.3,'sawtooth',0.08,i*0.16)); }
    function drawSound(){ beep(440,0.18,'sine',0.07); beep(440,0.18,'sine',0.07,0.2); }
    function fireworkSound(){
      try{ const c=actx(); const n=c.sampleRate*0.5; const b=c.createBuffer(1,n,c.sampleRate); const d=b.getChannelData(0);
        for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
        const s=c.createBufferSource(); s.buffer=b; const g=c.createGain(); g.gain.setValueAtTime(0.12,c.currentTime);
        s.connect(g); g.connect(c.destination); s.start();
      }catch(e){}
    }
    function thunderSound(){
      try{ const c=actx(); const n=c.sampleRate*1.0; const b=c.createBuffer(1,n,c.sampleRate); const d=b.getChannelData(0);
        for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,0.5);
        const s=c.createBufferSource(); s.buffer=b; const g=c.createGain(); g.gain.setValueAtTime(0.25,c.currentTime);
        s.connect(g); g.connect(c.destination); s.start();
      }catch(e){}
    }

    // ===== 音声読み上げ（ChromeとEdge統一版）=====
    function speak(text, pitch, rate){
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.pitch = (pitch != null ? pitch : 1.2);
        u.rate = (rate != null ? rate : 0.75);
        u.volume = 1.0;

        const trySpeak = () => {
          const vs = speechSynthesis.getVoices();
          let v = null;
          // ChromeもEdgeも両方にある「Google 日本語」を優先
          for(const voice of vs){
            if(voice.name === 'Google 日本語'){ v = voice; break; }
          }
          // なければ ja-JP の音声を使う
          if(!v){
            for(const voice of vs){
              if(voice.lang === 'ja-JP'){ v = voice; break; }
            }
          }
          if(v) u.voice = v;
          speechSynthesis.speak(u);
        };

        const vs = speechSynthesis.getVoices();
        if(vs.length > 0){
          trySpeak();
        } else {
          // 音声リストがまだ読み込まれていない場合（Edgeで起きやすい）
          speechSynthesis.onvoiceschanged = () => {
            speechSynthesis.onvoiceschanged = null;
            trySpeak();
          };
        }
      }catch(e){}
    }

    // ===== BGM =====
    let bgmOn=false, bgmTimer=null, bgmStep=0;
    const bgmNotes=[523,659,784,659,587,784,880,784, 523,659,784,1046,880,784,659,587];
    function startBGM(){ if(bgmTimer) return; bgmStep=0;
      bgmTimer=setInterval(()=>{ const f=bgmNotes[bgmStep%bgmNotes.length]; beep(f,0.22,'triangle',0.035); if(bgmStep%2===0) beep(f/2,0.22,'sine',0.025); bgmStep++; }, 260);
    }
    function stopBGM(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }
    const bgmBtn=document.getElementById('bgmBtn');
    bgmBtn.addEventListener('click', ()=>{ actx(); bgmOn=!bgmOn; if(bgmOn){ startBGM(); bgmBtn.textContent='🔊'; } else { stopBGM(); bgmBtn.textContent='🔇'; } });

    // ===== 要素 =====
    const HANDS=[{name:'グー',emoji:'✊',beats:1},{name:'チョキ',emoji:'✌️',beats:2},{name:'パー',emoji:'🖐',beats:0}];
    const TOTAL=5;
    let round=1, wins=0, loses=0, busy=false, canPick=false;
    const youBubble=document.getElementById('youBubble'), cpuBubble=document.getElementById('cpuBubble');
    const youImg=document.getElementById('youImg'), cpuImg=document.getElementById('cpuImg');
    const msg=document.getElementById('message'), arrow=document.getElementById('arrow');
    const wrap=document.getElementById('wrap'), flash=document.getElementById('flash'), lightning=document.getElementById('lightning');
    const finale=document.getElementById('finale'), finaleText=document.getElementById('finaleText');
    const tbody=document.getElementById('tbody');
    const buttons=[...document.querySelectorAll('.choice-btn')];
    function setButtons(on){ buttons.forEach(b=>b.disabled=!on); }

    function buildTable(){
      tbody.innerHTML='';
      for(let i=1;i<=TOTAL;i++){
        tbody.innerHTML += `<tr id="row${i}"><td>${i}</td><td id="b${i}">-</td><td id="y${i}">-</td><td id="r${i}">-</td></tr>`;
      }
    }
    function highlightRow(r){
      for(let i=1;i<=TOTAL;i++){ const el=document.getElementById('row'+i); if(el) el.classList.toggle('curRow', i===r); }
    }

    function doFlash(color){ flash.style.background=color; flash.style.opacity='1'; setTimeout(()=>flash.style.opacity='0',180); }

    function startRound(){
      highlightRow(round);
      youBubble.textContent='？'; cpuBubble.textContent='？';
      youImg.classList.remove('jumping'); cpuImg.classList.remove('jumping');
      arrow.style.visibility='hidden'; canPick=false; setButtons(false);
      msg.textContent='第'+round+'回戦！';
      setTimeout(()=>{ youImg.classList.add('shaking'); cpuImg.classList.add('shaking'); msg.textContent='じゃんけん…'; speak('じゃんけん'); ponSound(); }, 700);
      setTimeout(()=>{ msg.textContent='ぽん！'; speak('ぽん'); }, 2000);
      setTimeout(()=>{
        youImg.classList.remove('shaking'); cpuImg.classList.remove('shaking');
        msg.textContent='どれを出す？👇'; arrow.style.visibility='visible';
        canPick=true; setButtons(true);
      }, 3000);
    }

    function pick(playerHand){
      if(!canPick || busy) return;
      busy=true; canPick=false; setButtons(false); arrow.style.visibility='hidden';
      const cpuHand=Math.floor(Math.random()*3);
      youBubble.textContent=HANDS[playerHand].emoji; cpuBubble.textContent=HANDS[cpuHand].emoji;
      [youBubble,cpuBubble].forEach(b=>{ b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop'); });

      let result;
      if(playerHand===cpuHand) result='draw';
      else if(HANDS[playerHand].beats===cpuHand) result='win';
      else result='lose';

      if(result==='draw'){
        msg.textContent='あいこ！もう一回！'; doFlash('radial-gradient(circle, rgba(255,255,255,0.5), rgba(255,255,255,0))');
        drawSound(); speak('あいこでしょ');
        setTimeout(()=>{ busy=false; startRound(); }, 1500);
        return;
      }
      document.getElementById('b'+round).textContent=HANDS[cpuHand].emoji;
      document.getElementById('y'+round).textContent=HANDS[playerHand].emoji;
      if(result==='win'){ wins++; document.getElementById('r'+round).textContent='○'; document.getElementById('r'+round).style.color='#ffd700';
        msg.textContent='この回はあなたの勝ち！'; doFlash('radial-gradient(circle, rgba(255,215,0,0.7), rgba(255,140,0,0.1))'); winSound(); speak('かち');
      } else { loses++; document.getElementById('r'+round).textContent='×'; document.getElementById('r'+round).style.color='#7fb3ff';
        msg.textContent='この回は男の子の勝ち…'; doFlash('radial-gradient(circle, rgba(60,80,160,0.8), rgba(10,10,30,0.3))'); loseSound(); speak('まけ');
      }

      setTimeout(()=>{
        busy=false;
        if(round>=TOTAL){ doFinale(); }
        else { round++; startRound(); }
      }, 1600);
    }

    buttons.forEach(b=>{
      const handler=(e)=>{ e.preventDefault(); actx(); if(bgmOn&&!bgmTimer) startBGM(); pick(parseInt(b.dataset.hand,10)); };
      b.addEventListener('click', handler);
      b.addEventListener('touchstart', handler, {passive:false});
    });

    function doFinale(){
      highlightRow(0);
      const youWin = wins>loses;
      finale.classList.add('show');
      if(youWin){
        finaleText.innerHTML='<div class="bigzoom" style="font-size:60px;color:#ffd700;text-shadow:0 0 24px #ffae00;">優勝！🏆</div>'
          +'<div class="text-white text-xl mt-2">あなた '+wins+' - '+loses+' 男の子</div>';
        msg.textContent='やったね！かったよ！';
        youImg.classList.add('jumping');
        speak('やったね。かったよ', 1.3, 0.7);
        fireworksShow();
      } else {
        finaleText.innerHTML='<div class="bigzoom" style="font-size:56px;color:#7fb3ff;text-shadow:0 0 20px #2255aa;">まけちゃった…💧</div>'
          +'<div class="text-white text-xl mt-2">あなた '+wins+' - '+loses+' 男の子</div>';
        msg.textContent='残念、まけちゃった';
        speak('残念、まけちゃった', 1.2, 0.7);
        rainShow(); lightningShow();
      }
    }

    document.getElementById('restartBtn').addEventListener('click', ()=>{
      finale.classList.remove('show');
      round=1; wins=0; loses=0;
      buildTable();
      startRound();
    });

    function fireworksShow(){
      const colors=['#ff4757','#ffd700','#00d2d3','#ff6b81','#7bed9f','#ff9ff3','#54a0ff'];
      let count=0;
      const iv=setInterval(()=>{
        fireworkSound();
        const cx=10+Math.random()*80, cy=10+Math.random()*45;
        for(let i=0;i<16;i++){
          const p=document.createElement('div'); p.className='fw-p';
          const ang=(i/16)*Math.PI*2, dist=70+Math.random()*60;
          p.style.left=cx+'vw'; p.style.top=cy+'vh';
          p.style.background=colors[Math.floor(Math.random()*colors.length)];
          p.style.setProperty('--x','0');
          p.style.transform='translate('+Math.cos(ang)*dist+'px,'+Math.sin(ang)*dist+'px)';
          document.body.appendChild(p);
          setTimeout(()=>p.remove(),1500);
        }
        confettiBurst(30);
        count++; if(count>=5) clearInterval(iv);
      }, 600);
    }
    function confettiBurst(n){
      const colors=['#ff4757','#ffd700','#00d2d3','#ff6b81','#7bed9f','#ff9ff3','#54a0ff'];
      for(let i=0;i<n;i++){ const p=document.createElement('div'); p.className='confetti';
        p.style.left=Math.random()*100+'vw'; p.style.background=colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDuration=(1.4+Math.random()*1.4)+'s'; p.style.animationDelay=(Math.random()*0.3)+'s';
        document.body.appendChild(p); setTimeout(()=>p.remove(),3000); }
    }
    function rainShow(){
      let count=0;
      const iv=setInterval(()=>{
        for(let i=0;i<14;i++){ const p=document.createElement('div'); p.className='rain'; p.textContent='💧';
          p.style.left=Math.random()*100+'vw'; p.style.animationDuration=(0.9+Math.random()*0.9)+'s'; p.style.animationDelay=(Math.random()*0.2)+'s';
          document.body.appendChild(p); setTimeout(()=>p.remove(),2200); }
        count++; if(count>=6) clearInterval(iv);
      }, 500);
    }
    function lightningShow(){
      let count=0;
      const flashIt=()=>{ lightning.classList.remove('on'); void lightning.offsetWidth; lightning.classList.add('on'); thunderSound(); };
      flashIt();
      const iv=setInterval(()=>{ flashIt(); count++; if(count>=3) clearInterval(iv); }, 1100);
    }

    document.addEventListener('gesturestart', e=>e.preventDefault());
    document.addEventListener('contextmenu', e=>e.preventDefault());
    let lastTouch=0;
    document.addEventListener('touchend', e=>{ const n=Date.now(); if(n-lastTouch<=300) e.preventDefault(); lastTouch=n; }, {passive:false});

    buildTable();
    setTimeout(startRound, 600);
  </script>
 </body>
</html>
